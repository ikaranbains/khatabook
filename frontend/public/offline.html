<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff5f34" />
    <title>KhataBook - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f7f7f5;
        color: #151513;
      }
      .card {
        width: min(92vw, 420px);
        background: #fff;
        border: 1px solid rgba(21, 21, 19, 0.12);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(21, 21, 19, 0.08);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }
      p {
        margin: 0 0 16px;
        font-size: 0.95rem;
        color: #5f5c52;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: #ff5f34;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>KhataBook will show cached data if available. Reconnect and try again for fresh updates.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
